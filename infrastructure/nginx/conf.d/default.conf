limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

server {
    listen 80;
    server_name xocoa.co www.xocoa.co;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name xocoa.co www.xocoa.co;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/xocoa.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xocoa.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ----------------------------------------------------------------------
    # Security: Bot Blocking & IP Bans
    # ----------------------------------------------------------------------
    deny 185.177.72.22;
    deny 204.76.203.210;
    if ($http_user_agent ~* (SemrushBot|AhrefsBot|MJ12bot|DotBot|PetalBot|Bytespider)) {
        return 403;
    }

    # ----------------------------------------------------------------------
    # Performance: Gzip
    # ----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # ----------------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----------------------------------------------------------------------
    # Proxy Timeouts
    # ----------------------------------------------------------------------
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # ----------------------------------------------------------------------
    # Main Application Proxy
    # ----------------------------------------------------------------------
    location / {
        limit_req zone=one burst=20 nodelay;
        proxy_pass http://xocoa-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
