limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

server {
    listen 80;
    server_name xocoa.co www.xocoa.co localhost;

    # ----------------------------------------------------------------------
    # Security: Bot Blocking & IP Bans
    # ----------------------------------------------------------------------
    # Block specific abusive IPs identified in logs
    deny 185.177.72.22;   # Bucklog SARL Scanner
    deny 204.76.203.210;  # Tor Exit Node / Scanner

    # Block specific User Agents
    if ($http_user_agent ~* (SemrushBot|AhrefsBot|MJ12bot|DotBot|PetalBot|Bytespider)) {
        return 403;
    }

    # ----------------------------------------------------------------------
    # Performance: Gzip Compression
    # ----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # ----------------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    server_tokens off; # Hide Nginx version

    # ----------------------------------------------------------------------
    # Proxy Timeouts (Crucial for AI/LLM)
    # ----------------------------------------------------------------------
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # ----------------------------------------------------------------------
    # Main Application Proxy
    # ----------------------------------------------------------------------
    location / {
        # Rate Limiting: 10 req/sec with a burst of 20
        limit_req zone=one burst=20 nodelay;

        proxy_pass http://xocoa-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------------------
    # Health Check
    # ----------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}