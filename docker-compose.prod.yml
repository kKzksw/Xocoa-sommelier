services:
  # -----------------------------
  # ENTRY POINT (NGINX)
  # -----------------------------
  nginx:
    image: nginx:alpine
    container_name: xocoa_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - xocoa-frontend
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    restart: always
    networks:
      - xocoa-net

  # -----------------------------
  # CERTBOT (SSL Auto-Renew)
  # -----------------------------
  certbot:
    image: certbot/certbot
    container_name: xocoa_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - xocoa-net

  # -----------------------------
  # FRONTEND (Next.js)
  # -----------------------------
  xocoa-frontend:
    # PULL FROM REGISTRY (No local build)
    image: ghcr.io/hrishi-alikatte/xocoa---prototype--frontend:latest
    container_name: xocoa_frontend
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://xocoa-backend:8000
    depends_on:
      - xocoa-backend
    restart: always
    networks:
      - xocoa-net

  # -----------------------------
  # BACKEND (FastAPI)
  # -----------------------------
  xocoa-backend:
    # PULL FROM REGISTRY (No local build)
    image: ghcr.io/hrishi-alikatte/xocoa---prototype--backend:latest
    container_name: xocoa_backend
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always
    networks:
      - xocoa-net

networks:
  xocoa-net:
    driver: bridge